global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "sanbao"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["host.docker.internal:3000"]
    scrape_interval: 30s

  - job_name: "leemadb"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8110"]
    scrape_interval: 15s

  - job_name: "orchestrator"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8120"]
    scrape_interval: 15s
