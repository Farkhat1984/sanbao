# Nginx proxy to K3s Ingress Controller (NodePort 30080/30443)
# Place in /etc/nginx/sites-enabled/ when migrating services to K3s
#
# Usage: After deploying services to K3s, switch the upstream from
# Docker containers to K3s ingress.

upstream k3s_ingress_http {
    server 127.0.0.1:30080;
}

upstream k3s_ingress_https {
    server 127.0.0.1:30443;
}

